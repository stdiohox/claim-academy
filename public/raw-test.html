<!DOCTYPE html>
<html>
<head><title>Raw Test</title></head>
<body>
  <h1>Raw HTML Test - No React</h1>
  <input type="text" id="test-input" placeholder="Type here"
    style="padding: 1rem; font-size: 1.2rem; width: 300px;" />
  <p id="output"></p>
  <script>
    document.getElementById('test-input').addEventListener('input', (e) => {
      document.getElementById('output').textContent = e.target.value;
    });
  </script>
</body>
</html>
